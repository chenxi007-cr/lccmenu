<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=pdf/LeCoucou_Menu.pdf">
    <title>Lecoucou Menu</title>
    
    <style>
        body {
            font-family: 'Noto Serif SC', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f8f8;
            color: #333;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #d4af37; 
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
    
    <script type="text/javascript">
        // 第二重保险，路径也必须一致
        window.location.href = "pdf/LeCoucou_Menu.pdf";
    </script>
</head>
<body>
    <div class="loader"></div>
    <p style="margin-top: 20px;">正在为您加载菜单 / Loading Menu...</p>
    
    <a href="pdf/LeCoucou_Menu.pdf" class="btn">点击此处手动打开菜单 / VIEW MENU</a>
    
    <p style="font-size: 12px; color: #999; margin-top: 30px;">Lecoucou Restaurant</p>
</body>
</html>
